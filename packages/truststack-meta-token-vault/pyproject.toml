[project]
name = "truststack-meta-token-vault"
version = "0.1.0"
description = "The standard token-management layer for Meta/WhatsApp apps: storage, rotation, expiry, audit, and encryption."
requires-python = ">=3.11"
license = "MIT"
readme = "README.md"
authors = [{ name = "Trust Stack" }]
keywords = ["trust-stack", "ai-agents", "meta", "whatsapp", "tokens", "secrets", "vault"]
classifiers = [
  "Development Status :: 3 - Alpha",
  "Intended Audience :: Developers",
  "License :: OSI Approved :: MIT License",
  "Programming Language :: Python :: 3.11",
  "Programming Language :: Python :: 3.12",
  "Programming Language :: Python :: 3.13",
  "Typing :: Typed",
]
dependencies = ["truststack-core"]

[project.optional-dependencies]
fernet = ["cryptography>=42"]
aws = ["boto3>=1.34"]
azure = ["azure-keyvault-secrets>=4", "azure-identity>=1"]
hvac = ["hvac>=2"]
postgres = ["asyncpg>=0.29"]
api = ["fastapi>=0.110"]

[project.scripts]
meta-token-vault = "meta_token_vault.cli:main"

[project.urls]
Homepage = "https://github.com/vigilancetrent/truststack"
Repository = "https://github.com/vigilancetrent/truststack"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/meta_token_vault"]

[tool.uv.sources]
truststack-core = { workspace = true }
