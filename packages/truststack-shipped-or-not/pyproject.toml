[project]
name = "truststack-shipped-or-not"
version = "0.1.0"
description = "Verify deployment claims with evidence — SHIPPED only when the URL truly resolves, responds, and serves a valid certificate."
requires-python = ">=3.11"
license = "MIT"
readme = "README.md"
authors = [{ name = "Trust Stack" }]
keywords = ["trust-stack", "ai-agents", "deployment", "verification", "ssl", "healthcheck"]
classifiers = [
  "Development Status :: 3 - Alpha",
  "Intended Audience :: Developers",
  "License :: OSI Approved :: MIT License",
  "Programming Language :: Python :: 3.11",
  "Programming Language :: Python :: 3.12",
  "Programming Language :: Python :: 3.13",
  "Typing :: Typed",
]
dependencies = ["truststack-core", "httpx>=0.27"]

[project.scripts]
shipped-or-not = "shipped_or_not.cli:main"

[project.urls]
Homepage = "https://github.com/vigilancetrent/truststack"
Repository = "https://github.com/vigilancetrent/truststack"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/shipped_or_not"]

[tool.uv.sources]
truststack-core = { workspace = true }
