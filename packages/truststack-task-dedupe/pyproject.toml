[project]
name = "truststack-task-dedupe"
version = "0.1.0"
description = "Prevent duplicate task creation via intent fingerprinting and similarity scoring."
requires-python = ">=3.11"
license = "MIT"
readme = "README.md"
authors = [{ name = "Trust Stack" }]
keywords = ["trust-stack", "ai-agents", "deduplication", "fingerprinting", "task-management"]
classifiers = [
  "Development Status :: 3 - Alpha",
  "Intended Audience :: Developers",
  "License :: OSI Approved :: MIT License",
  "Programming Language :: Python :: 3.11",
  "Programming Language :: Python :: 3.12",
  "Programming Language :: Python :: 3.13",
  "Typing :: Typed",
]
dependencies = ["truststack-core"]

[project.optional-dependencies]
redis = ["redis>=5"]
postgres = ["asyncpg>=0.29"]
api = ["fastapi>=0.110"]
semantic = ["rapidfuzz>=3"]

[project.urls]
Homepage = "https://github.com/vigilancetrent/truststack"
Repository = "https://github.com/vigilancetrent/truststack"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/task_dedupe"]

[tool.uv.sources]
truststack-core = { workspace = true }
