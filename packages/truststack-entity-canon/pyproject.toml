[project]
name = "truststack-entity-canon"
version = "0.1.0"
description = "Canonicalize entity names with fuzzy + phonetic matching to block duplicate insertions."
requires-python = ">=3.11"
license = "MIT"
readme = "README.md"
authors = [{ name = "Trust Stack" }]
keywords = [
  "trust-stack",
  "ai-agents",
  "entity-resolution",
  "deduplication",
  "fuzzy-matching",
  "phonetic",
]
classifiers = [
  "Development Status :: 3 - Alpha",
  "Intended Audience :: Developers",
  "License :: OSI Approved :: MIT License",
  "Programming Language :: Python :: 3.11",
  "Programming Language :: Python :: 3.12",
  "Programming Language :: Python :: 3.13",
  "Typing :: Typed",
]
dependencies = ["truststack-core"]

[project.optional-dependencies]
phonetic = ["jellyfish>=1"]
api = ["fastapi>=0.110"]
postgres = ["asyncpg>=0.29"]

[project.urls]
Homepage = "https://github.com/vigilancetrent/truststack"
Repository = "https://github.com/vigilancetrent/truststack"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/entity_canon"]

[tool.uv.sources]
truststack-core = { workspace = true }
