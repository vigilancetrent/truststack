[project]
name = "truststack-core"
version = "0.1.0"
description = "Shared contract, structured logging, event bus, and OpenTelemetry helpers for the Trust Stack."
requires-python = ">=3.11"
license = "MIT"
readme = "README.md"
authors = [{ name = "Trust Stack" }]
keywords = ["trust-stack", "ai-agents", "observability", "structured-logging", "opentelemetry"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Typing :: Typed",
]
dependencies = [
    "pydantic>=2.7",
    "structlog>=24.1",
    "opentelemetry-api>=1.25",
]

[project.optional-dependencies]
otel-sdk = ["opentelemetry-sdk>=1.25"]

[project.urls]
Homepage = "https://github.com/vigilancetrent/truststack"
Repository = "https://github.com/vigilancetrent/truststack"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/truststack"]
